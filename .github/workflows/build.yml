name: Build FlowBoard Pro for Windows

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Bundle XLSX library
        shell: pwsh
        run: |
          if (Test-Path "node_modules/xlsx/dist/xlsx.full.min.js") {
            Copy-Item "node_modules/xlsx/dist/xlsx.full.min.js" "src/xlsx.full.min.js" -Force
          }

      - name: Build Windows installers
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Setup installer
        uses: actions/upload-artifact@v4
        with:
          name: FlowBoard-Pro-Setup-${{ github.run_number }}
          path: dist/*Setup*.exe
          retention-days: 30

      - name: Upload Portable exe
        uses: actions/upload-artifact@v4
        with:
          name: FlowBoard-Pro-Portable-${{ github.run_number }}
          path: dist/*Portable*.exe
          retention-days: 30
